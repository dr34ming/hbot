<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HBOT Tapper</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117;
    --bg-card: #181b24;
    --text: #d4d7e0;
    --text-muted: #8a8f9e;
    --text-bright: #eef0f6;
    --accent: #4a9eab;
    --accent-dim: #3a7e8b;
    --green: #3daa6d;
    --amber: #c4913a;
    --border: #282c3a;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font-family: var(--font); color: var(--text);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    touch-action: none; -webkit-touch-callout: none; user-select: none;
  }
  canvas { display: block; cursor: pointer; }
  .back-link {
    position: fixed; top: 12px; left: 14px; z-index: 100;
    font-size: 13px; color: var(--text-muted); text-decoration: none;
    font-family: var(--font);
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<a class="back-link" href="../index.html">&larr; Back to HBOT Science</a>
<canvas id="g"></canvas>
<script>
// ─── HBOT Tapper ───────────────────────────────────────────────────────────
(() => {
'use strict';

const C = document.getElementById('g');
const ctx = C.getContext('2d');
const FONT = getComputedStyle(document.body).fontFamily;

// ─── Audio ─────────────────────────────────────────────────────────────────
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const sfx = {
  send()    { playTone(520, 0.08, 'square', 0.05); },
  caught()  { playTone(880, 0.06, 'sine', 0.04); },
  pressurize() { playTone(330, 0.15, 'triangle', 0.04); },
  served()  { playTone(660, 0.12, 'triangle', 0.05); playTone(990, 0.08, 'sine', 0.03); },
  miss()    { playTone(150, 0.3, 'sawtooth', 0.06); playTone(100, 0.4, 'sawtooth', 0.04); },
  wave()    { playTone(440, 0.1, 'sine', 0.05); setTimeout(() => playTone(660, 0.1, 'sine', 0.05), 120); setTimeout(() => playTone(880, 0.15, 'sine', 0.05), 240); },
  gameOver(){ playTone(300, 0.2, 'square', 0.05); setTimeout(() => playTone(200, 0.3, 'square', 0.05), 200); setTimeout(() => playTone(100, 0.5, 'square', 0.06), 450); },
  bonus()   { for (let i = 0; i < 5; i++) setTimeout(() => playTone(600 + i * 100, 0.08, 'sine', 0.04), i * 60); },
};

// ─── Theme Colors ──────────────────────────────────────────────────────────
const COL = {
  bg: '#0f1117', bgCard: '#181b24', text: '#d4d7e0', textMuted: '#8a8f9e',
  bright: '#eef0f6', accent: '#4a9eab', accentDim: '#3a7e8b',
  green: '#3daa6d', amber: '#c4913a', red: '#e05555',
  border: '#282c3a', borderLight: '#333848',
  chamber: '#1e2a35', laneA: '#141720', laneB: '#111419',
};
const CUST_COLS = ['#c06040','#80a050','#7070c0','#c070a0','#a09040','#50a0a0','#a06080','#6090b0','#b08060','#6080a0'];

// ─── Layout Constants ──────────────────────────────────────────────────────
const LANES = 4;
const HUD_H = 50;
let W, H, LH, laneY, SERVE_X, SPAWN_X, CH_W, CH_H;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const maxW = Math.min(window.innerWidth, 960);
  const maxH = Math.min(window.innerHeight - 10, 660);
  const ar = 16 / 10;
  if (maxW / maxH > ar) { H = maxH; W = Math.floor(H * ar); }
  else { W = maxW; H = Math.floor(W / ar); }
  C.style.width = W + 'px'; C.style.height = H + 'px';
  C.width = Math.floor(W * dpr); C.height = Math.floor(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  LH = Math.floor((H - HUD_H - 16) / LANES);
  laneY = i => HUD_H + 8 + i * LH;
  SERVE_X = 65;   // left edge where player stands / chambers originate
  SPAWN_X = W - 20; // right edge where customers spawn
  CH_W = Math.floor(LH * 0.72);
  CH_H = Math.floor(LH * 0.46);
}
resize();
window.addEventListener('resize', resize);

// ─── Game State ────────────────────────────────────────────────────────────
let state = 'title'; // title | waveIntro | playing | gameOver
let score, lives, chamberCount, wave;
let customers, chambers, returning;
let waveLeft, spawnTimer, wavePerfect;
let waveIntroTimer;
let flashes, shakeT, shakeI, tick;

function resetGame() {
  score = 0; lives = 3; chamberCount = 4; wave = 0;
  customers = []; chambers = []; returning = [];
  flashes = []; shakeT = 0; shakeI = 0; tick = 0;
}

// ─── Wave Config ───────────────────────────────────────────────────────────
function waveCfg(w) {
  return {
    count: Math.min(3 + w * 2, 25),
    speed: 30 + w * 8,                              // customer walk px/s
    spawnMin: Math.max(0.5, 2.2 - w * 0.18),        // min time between spawns
    spawnMax: Math.max(1.0, 3.5 - w * 0.22),        // max time between spawns
    pressTime: Math.max(1.2, 3.0 - w * 0.18),       // seconds to pressurize
    returnSpeed: 180 + w * 20,                       // chamber return speed
    chamberSlideSpeed: 380 + w * 10,                 // chamber send speed
  };
}

function startWave() {
  wave++;
  const cfg = waveCfg(wave);
  waveLeft = cfg.count;
  spawnTimer = 0.8;
  wavePerfect = true;
  state = 'waveIntro';
  waveIntroTimer = 1.6;
  sfx.wave();
}

// ─── Spawning ──────────────────────────────────────────────────────────────
function spawnCustomer() {
  if (waveLeft <= 0) return;

  // prefer empty lanes, then least-occupied
  const counts = new Array(LANES).fill(0);
  for (const c of customers) if (!c.served) counts[c.lane]++;
  const minCount = Math.min(...counts);
  const cands = [];
  for (let i = 0; i < LANES; i++) if (counts[i] === minCount) cands.push(i);

  const lane = cands[Math.floor(Math.random() * cands.length)];
  customers.push({
    lane,
    x: SPAWN_X + 10 + Math.random() * 30,
    color: CUST_COLS[Math.floor(Math.random() * CUST_COLS.length)],
    served: false,   // true once pressurization complete
    exitTimer: 0,    // counts up after served
    inChamber: false, // true while being pressurized
  });
  waveLeft--;
}

// ─── Actions ───────────────────────────────────────────────────────────────
function sendChamber(lane) {
  if (state !== 'playing' || chamberCount <= 0) return;
  // block if there's already a sliding chamber or pressurizing one in this lane
  if (chambers.some(c => c.lane === lane)) return;

  chamberCount--;
  const cfg = waveCfg(wave);
  chambers.push({
    lane,
    x: SERVE_X + 35,
    speed: cfg.chamberSlideSpeed,
    phase: 'sliding', // sliding | pressurizing
    progress: 0,
    duration: cfg.pressTime,
    customer: null,
  });
  sfx.send();
}

function tryCatch(lane) {
  // find a returning chamber in this lane near the catch zone
  const idx = returning.findIndex(r => r.lane === lane && r.x < SERVE_X + 80);
  if (idx === -1) return false;
  returning.splice(idx, 1);
  chamberCount++;
  sfx.caught();
  flash('CAUGHT!', SERVE_X + 50, laneY(lane) + LH / 2, COL.green);
  return true;
}

function laneAction(lane) {
  if (lane < 0 || lane >= LANES) return;
  if (!tryCatch(lane)) sendChamber(lane);
}

// ─── Helpers ───────────────────────────────────────────────────────────────
function flash(text, x, y, color) {
  flashes.push({ text, x, y, color, t: 0.9 });
}

// ─── Update ────────────────────────────────────────────────────────────────
let lastT = 0;

function update(dt) {
  tick += dt;
  shakeT = Math.max(0, shakeT - dt);
  flashes = flashes.filter(f => { f.t -= dt; f.y -= dt * 28; return f.t > 0; });

  if (state === 'waveIntro') {
    waveIntroTimer -= dt;
    if (waveIntroTimer <= 0) state = 'playing';
    return;
  }
  if (state !== 'playing') return;

  const cfg = waveCfg(wave);

  // ── spawn ──
  if (waveLeft > 0) {
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnCustomer();
      spawnTimer = cfg.spawnMin + Math.random() * (cfg.spawnMax - cfg.spawnMin);
    }
  }

  // ── move customers ──
  for (let i = customers.length - 1; i >= 0; i--) {
    const c = customers[i];

    // served customers walk away
    if (c.served) {
      c.exitTimer += dt;
      c.x += dt * 140;
      if (c.x > SPAWN_X + 60) customers.splice(i, 1);
      continue;
    }

    // being pressurized - don't move
    if (c.inChamber) continue;

    // walking toward the player
    c.x -= dt * cfg.speed;

    // hit the wall = life lost
    if (c.x <= SERVE_X) {
      lives--;
      wavePerfect = false;
      sfx.miss();
      shakeT = 0.35; shakeI = 7;
      flash('MISSED!', SERVE_X + 30, laneY(c.lane) + LH / 2, COL.red);
      customers.splice(i, 1);
      if (lives <= 0) { state = 'gameOver'; sfx.gameOver(); return; }
    }
  }

  // ── chambers (sliding + pressurizing) ──
  for (let i = chambers.length - 1; i >= 0; i--) {
    const ch = chambers[i];

    if (ch.phase === 'sliding') {
      ch.x += dt * ch.speed;

      // find the nearest un-served customer in this lane
      let nearest = null, nearDist = Infinity;
      for (const c of customers) {
        if (c.lane === ch.lane && !c.served && !c.inChamber && c.x > ch.x) {
          const d = c.x - ch.x;
          if (d < nearDist) { nearDist = d; nearest = c; }
        }
      }

      if (nearest && ch.x + CH_W >= nearest.x - 5) {
        // chamber meets customer
        ch.phase = 'pressurizing';
        ch.x = nearest.x - CH_W + 5;
        ch.customer = nearest;
        nearest.inChamber = true;
        sfx.pressurize();
      } else if (ch.x > SPAWN_X + 30) {
        // slid off right edge with no customer to hit
        chambers.splice(i, 1);
        wavePerfect = false;
        flash('WASTED!', SPAWN_X - 40, laneY(ch.lane) + LH / 2, COL.amber);
        // chamber is lost (doesn't come back)
      }

    } else if (ch.phase === 'pressurizing') {
      ch.progress += dt / ch.duration;
      if (ch.progress >= 1) {
        // done! customer served
        ch.customer.served = true;
        ch.customer.inChamber = false;
        score += 10 * wave;
        sfx.served();
        flash('+' + (10 * wave), ch.x + CH_W / 2, laneY(ch.lane) + LH / 2 - 12, COL.accent);

        // chamber returns
        returning.push({ lane: ch.lane, x: ch.x, speed: cfg.returnSpeed });
        chambers.splice(i, 1);
      }
    }
  }

  // ── returning chambers ──
  for (let i = returning.length - 1; i >= 0; i--) {
    const r = returning[i];
    r.x -= dt * r.speed;
    if (r.x <= SERVE_X - CH_W - 20) {
      // missed catch
      returning.splice(i, 1);
      wavePerfect = false;
      shakeT = 0.25; shakeI = 4;
      sfx.miss();
      flash('LOST CHAMBER!', SERVE_X + 20, laneY(r.lane) + LH / 2, COL.red);
      // chamber is permanently lost
    }
  }

  // ── wave complete check ──
  const allDone = waveLeft <= 0
    && customers.every(c => c.served)
    && chambers.length === 0
    && returning.length === 0;
  if (allDone) {
    // clean up served customers immediately
    customers = [];
    if (wavePerfect) {
      const bonus = 50 * wave;
      score += bonus;
      sfx.bonus();
      flash('PERFECT WAVE! +' + bonus, W / 2, H / 2, COL.green);
    }
    if (chamberCount < 4) chamberCount = Math.min(4, chamberCount + 1);
    startWave();
  }

  // ── stuck check: no chambers in play and none to send ──
  if (chamberCount <= 0 && chambers.length === 0 && returning.length === 0) {
    const unserved = customers.some(c => !c.served && !c.inChamber);
    if (unserved || waveLeft > 0) {
      // can't serve anyone, just let the customers walk to the wall
    }
  }
}

// ─── Drawing ───────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawChamber(x, y, w, h, fillPct) {
  const r = h * 0.35;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  roundRect(x + 2, y + 3, w, h, r); ctx.fill();
  // body
  ctx.fillStyle = COL.chamber;
  ctx.strokeStyle = COL.accent;
  ctx.lineWidth = 1.5;
  roundRect(x, y, w, h, r); ctx.fill(); ctx.stroke();
  // fill
  if (fillPct > 0) {
    ctx.save();
    roundRect(x + 2, y + 2, w - 4, h - 4, r - 1); ctx.clip();
    const fw = (w - 4) * Math.min(fillPct, 1);
    const g = ctx.createLinearGradient(x, y, x + fw, y + h);
    g.addColorStop(0, 'rgba(74,158,171,0.12)');
    g.addColorStop(0.5, 'rgba(74,158,171,0.4)');
    g.addColorStop(1, 'rgba(74,158,171,0.55)');
    ctx.fillStyle = g;
    ctx.fillRect(x + 2, y + 2, fw, h - 4);
    ctx.restore();
    // pct label
    ctx.fillStyle = COL.bright;
    ctx.font = `bold ${Math.floor(h * 0.28)}px ${FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(Math.floor(fillPct * 100) + '%', x + w / 2, y + h / 2);
  }
  // window lines
  ctx.strokeStyle = 'rgba(74,158,171,0.15)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(x + w * 0.2, y + h * 0.3); ctx.lineTo(x + w * 0.8, y + h * 0.3);
  ctx.moveTo(x + w * 0.2, y + h * 0.7); ctx.lineTo(x + w * 0.8, y + h * 0.7);
  ctx.stroke();
}

function drawCustomer(x, y, h, color, happy) {
  const bw = h * 0.28;
  const headR = bw * 0.55;
  const cx = x + bw / 2;
  const bodyTop = y + headR * 2 + 3;
  const bodyH = h * 0.55;

  // legs (walk animation)
  const legPhase = Math.sin(tick * 8 + x * 0.1);
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - 3, bodyTop + bodyH);
  ctx.lineTo(cx - 3 + legPhase * 3, bodyTop + bodyH + h * 0.15);
  ctx.moveTo(cx + 3, bodyTop + bodyH);
  ctx.lineTo(cx + 3 - legPhase * 3, bodyTop + bodyH + h * 0.15);
  ctx.stroke();

  // body
  ctx.fillStyle = color;
  roundRect(cx - bw * 0.4, bodyTop, bw * 0.8, bodyH, 3); ctx.fill();

  // head
  ctx.beginPath();
  ctx.arc(cx, y + headR + 1, headR, 0, Math.PI * 2); ctx.fill();

  if (happy) {
    // smile
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, y + headR + 2, headR * 0.4, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
  } else {
    // eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - headR * 0.28, y + headR, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + headR * 0.28, y + headR, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlayer(lane) {
  const y = laneY(lane) + LH * 0.12;
  const h = LH * 0.76;
  const x = 18;
  const bob = Math.sin(tick * 2.5 + lane * 1.3) * 1.5;
  const w = 28;

  // body
  ctx.fillStyle = COL.accent;
  roundRect(x, y + 12 + bob, w, h - 18, 5); ctx.fill();
  // head
  ctx.beginPath();
  ctx.arc(x + w / 2, y + 10 + bob, 8, 0, Math.PI * 2); ctx.fill();
  // visor
  ctx.fillStyle = '#2a5e68';
  ctx.beginPath();
  ctx.arc(x + w / 2 + 2, y + 9 + bob, 4, -0.4, Math.PI * 0.6); ctx.fill();
  // medical cross
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(x + w / 2, y + 22 + bob); ctx.lineTo(x + w / 2, y + 30 + bob);
  ctx.moveTo(x + w / 2 - 4, y + 26 + bob); ctx.lineTo(x + w / 2 + 4, y + 26 + bob);
  ctx.stroke();
}

function drawHeart(cx, cy, size, filled) {
  ctx.beginPath();
  ctx.moveTo(cx, cy + size * 0.2);
  ctx.bezierCurveTo(cx, cy - size * 0.1, cx - size * 0.5, cy - size * 0.35, cx - size * 0.65, cy + size * 0.05);
  ctx.bezierCurveTo(cx - size * 0.85, cy + size * 0.55, cx, cy + size * 0.85, cx, cy + size * 0.85);
  ctx.bezierCurveTo(cx, cy + size * 0.85, cx + size * 0.85, cy + size * 0.55, cx + size * 0.65, cy + size * 0.05);
  ctx.bezierCurveTo(cx + size * 0.5, cy - size * 0.35, cx, cy - size * 0.1, cx, cy + size * 0.2);
  if (filled) { ctx.fillStyle = COL.red; ctx.fill(); }
  else { ctx.strokeStyle = '#5a2020'; ctx.lineWidth = 1.2; ctx.stroke(); }
}

function draw() {
  ctx.save();
  if (shakeT > 0) {
    ctx.translate((Math.random() - 0.5) * shakeI, (Math.random() - 0.5) * shakeI);
  }

  ctx.fillStyle = COL.bg;
  ctx.fillRect(-10, -10, W + 20, H + 20);

  if (state === 'title') { drawTitle(); ctx.restore(); return; }

  drawPlayfield();

  if (state === 'waveIntro') drawWaveIntro();
  if (state === 'gameOver') drawGameOver();

  ctx.restore();
}

function drawPlayfield() {
  // ── HUD ──
  ctx.fillStyle = COL.bgCard;
  ctx.fillRect(0, 0, W, HUD_H - 2);
  ctx.fillStyle = COL.border;
  ctx.fillRect(0, HUD_H - 2, W, 1);

  ctx.fillStyle = COL.bright;
  ctx.font = `bold 18px ${FONT}`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('SCORE  ' + score, 14, HUD_H / 2 - 5);

  ctx.fillStyle = COL.accent;
  ctx.font = `bold 13px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('WAVE ' + wave, W / 2, HUD_H / 2 - 5);

  // chambers count
  ctx.fillStyle = COL.textMuted;
  ctx.font = `11px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('CHAMBERS', W / 2, HUD_H / 2 + 10);

  // chamber dots
  for (let i = 0; i < 4; i++) {
    const dx = W / 2 - 20 + i * 13;
    ctx.beginPath();
    ctx.arc(dx, HUD_H / 2 + 22, 3.5, 0, Math.PI * 2);
    if (i < chamberCount) { ctx.fillStyle = COL.accent; ctx.fill(); }
    else { ctx.strokeStyle = COL.borderLight; ctx.lineWidth = 1; ctx.stroke(); }
  }

  // lives
  for (let i = 0; i < 3; i++) {
    drawHeart(W - 52 + i * 20, HUD_H / 2 - 8, 10, i < lives);
  }

  // ── Lanes ──
  for (let i = 0; i < LANES; i++) {
    const y = laneY(i);
    ctx.fillStyle = i % 2 === 0 ? COL.laneA : COL.laneB;
    ctx.fillRect(0, y, W, LH);

    // lane divider
    ctx.fillStyle = COL.border;
    ctx.fillRect(0, y + LH - 1, W, 1);

    // service zone
    ctx.fillStyle = 'rgba(74,158,171,0.06)';
    ctx.fillRect(SERVE_X - 2, y + 2, 38, LH - 4);

    // lane number hint
    ctx.fillStyle = 'rgba(138,143,158,0.3)';
    ctx.font = `bold 11px ${FONT}`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText('' + (i + 1), 6, y + LH / 2);

    drawPlayer(i);
  }

  // ── Customers ──
  const cH = LH * 0.82;
  for (const c of customers) {
    if (c.inChamber) continue; // drawn as part of chamber
    drawCustomer(c.x, laneY(c.lane) + LH * 0.05, cH, c.color, c.served);
  }

  // ── Chambers in play ──
  for (const ch of chambers) {
    const cy = laneY(ch.lane) + (LH - CH_H) / 2;
    drawChamber(ch.x, cy, CH_W, CH_H, ch.phase === 'pressurizing' ? ch.progress : 0);
    // draw customer inside during pressurization
    if (ch.phase === 'pressurizing' && ch.customer) {
      const headR = CH_H * 0.14;
      ctx.fillStyle = ch.customer.color;
      ctx.beginPath();
      ctx.arc(ch.x + CH_W * 0.65, cy + CH_H * 0.35, headR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ch.x + CH_W * 0.65, cy + CH_H * 0.33, headR * 0.2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Returning Chambers ──
  for (const r of returning) {
    const cy = laneY(r.lane) + (LH - CH_H) / 2;
    // glow pulse
    const pulse = 0.5 + Math.sin(tick * 10) * 0.3;
    ctx.shadowColor = COL.accent;
    ctx.shadowBlur = 10 * pulse;
    drawChamber(r.x, cy, CH_W, CH_H, 0);
    ctx.shadowBlur = 0;
    // catch warning
    if (r.x < SERVE_X + 110) {
      ctx.fillStyle = COL.amber;
      ctx.font = `bold 11px ${FONT}`;
      ctx.textAlign = 'center';
      const blink = Math.sin(tick * 12) > 0;
      if (blink) ctx.fillText('CATCH!', r.x + CH_W / 2, laneY(r.lane) + 10);
    }
  }

  // ── Flash Messages ──
  for (const f of flashes) {
    ctx.globalAlpha = Math.min(1, f.t * 2.5);
    ctx.fillStyle = f.color;
    ctx.font = `bold 14px ${FONT}`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  }
}

function drawTitle() {
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);

  // animated chambers in background
  for (let i = 0; i < 3; i++) {
    ctx.globalAlpha = 0.12;
    const dx = W / 2 - 200 + i * 160;
    const dy = H * 0.15 + Math.sin(tick * 0.8 + i * 1.2) * 10;
    drawChamber(dx, dy, 110, 55, (Math.sin(tick * 0.5 + i * 2) + 1) / 2);
    ctx.globalAlpha = 1;
  }

  // walking customers in background
  for (let i = 0; i < 5; i++) {
    ctx.globalAlpha = 0.08;
    const cx = ((tick * 20 + i * 180) % (W + 60)) - 30;
    drawCustomer(cx, H * 0.2 + i * 15, 50, CUST_COLS[i], false);
    ctx.globalAlpha = 1;
  }

  ctx.fillStyle = COL.bright;
  ctx.font = `bold 44px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('HBOT TAPPER', W / 2, H * 0.38);

  ctx.fillStyle = COL.accent;
  ctx.font = `15px ${FONT}`;
  ctx.fillText('Hyperbaric Chamber Facility Simulator', W / 2, H * 0.44);

  const lines = [
    'Customers approach from the right -- send chambers to serve them!',
    'Click a lane or press 1-4 to send a chamber or catch returning ones.',
    'Miss a customer = lose a life. Miss a returning chamber = lose it forever.',
  ];
  lines.forEach((line, i) => {
    ctx.fillStyle = COL.textMuted;
    ctx.font = `13px ${FONT}`;
    ctx.fillText(line, W / 2, H * 0.53 + i * 20);
  });

  ctx.fillStyle = COL.amber;
  ctx.font = `bold 13px ${FONT}`;
  ctx.fillText('3 lives  /  4 chambers  /  speed increases each wave', W / 2, H * 0.63);

  // start button
  const bw = 190, bh = 50, bx = W / 2 - bw / 2, by = H * 0.72;
  const hover = mx >= bx && mx <= bx + bw && my >= by && my <= by + bh;
  ctx.fillStyle = hover ? COL.accent : COL.accentDim;
  roundRect(bx, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold 19px ${FONT}`;
  ctx.fillText('START GAME', W / 2, by + bh / 2);

  ctx.fillStyle = COL.textMuted;
  ctx.font = `11px ${FONT}`;
  ctx.fillText('or press SPACE / ENTER', W / 2, by + bh + 18);
}

function drawWaveIntro() {
  ctx.fillStyle = 'rgba(15,17,23,0.7)';
  ctx.fillRect(0, 0, W, H);

  const s = Math.min(1, (1.6 - waveIntroTimer) * 3);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(s, s);
  ctx.fillStyle = COL.bright;
  ctx.font = `bold 52px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('WAVE ' + wave, 0, -12);
  const cfg = waveCfg(wave);
  ctx.fillStyle = COL.textMuted;
  ctx.font = `14px ${FONT}`;
  ctx.fillText(cfg.count + ' customers incoming', 0, 28);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(15,17,23,0.85)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = COL.red;
  ctx.font = `bold 44px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W / 2, H * 0.28);

  ctx.fillStyle = COL.bright;
  ctx.font = `bold 26px ${FONT}`;
  ctx.fillText('Score: ' + score, W / 2, H * 0.40);

  ctx.fillStyle = COL.textMuted;
  ctx.font = `16px ${FONT}`;
  ctx.fillText('Reached Wave ' + wave, W / 2, H * 0.48);

  // high score (local storage)
  const best = parseInt(localStorage.getItem('hbot-tapper-best') || '0');
  if (score > best) {
    localStorage.setItem('hbot-tapper-best', '' + score);
    ctx.fillStyle = COL.green;
    ctx.font = `bold 14px ${FONT}`;
    ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.55);
  } else if (best > 0) {
    ctx.fillStyle = COL.textMuted;
    ctx.font = `13px ${FONT}`;
    ctx.fillText('Best: ' + best, W / 2, H * 0.55);
  }

  const bw = 200, bh = 50, bx = W / 2 - bw / 2, by = H * 0.62;
  const hover = mx >= bx && mx <= bx + bw && my >= by && my <= by + bh;
  ctx.fillStyle = hover ? COL.accent : COL.accentDim;
  roundRect(bx, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold 18px ${FONT}`;
  ctx.textAlign = 'center';
  ctx.fillText('PLAY AGAIN', W / 2, by + bh / 2);

  ctx.fillStyle = COL.textMuted;
  ctx.font = `11px ${FONT}`;
  ctx.fillText('or press SPACE / ENTER', W / 2, by + bh + 18);
}

// ─── Input ─────────────────────────────────────────────────────────────────
let mx = -1, my = -1;

function canvasPos(e) {
  const r = C.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - r.left) / r.width * W, y: (cy - r.top) / r.height * H };
}

C.addEventListener('mousemove', e => { const p = canvasPos(e); mx = p.x; my = p.y; });

function handleClick(e) {
  e.preventDefault();
  ensureAudio();
  const p = canvasPos(e);
  mx = p.x; my = p.y;

  if (state === 'title') { resetGame(); startWave(); return; }

  if (state === 'gameOver') {
    const bw = 200, bh = 50, bx = W / 2 - bw / 2, by = H * 0.62;
    if (mx >= bx && mx <= bx + bw && my >= by && my <= by + bh) {
      resetGame(); startWave();
    }
    return;
  }

  if (state === 'playing') {
    for (let i = 0; i < LANES; i++) {
      const y = laneY(i);
      if (p.y >= y && p.y < y + LH) { laneAction(i); return; }
    }
  }
}

C.addEventListener('click', handleClick);
C.addEventListener('touchstart', handleClick, { passive: false });

document.addEventListener('keydown', e => {
  ensureAudio();
  if ((state === 'title' || state === 'gameOver') && (e.code === 'Space' || e.code === 'Enter')) {
    e.preventDefault();
    resetGame(); startWave();
    return;
  }
  if (state === 'playing') {
    const map = { Digit1: 0, Digit2: 1, Digit3: 2, Digit4: 3, Numpad1: 0, Numpad2: 1, Numpad3: 2, Numpad4: 3 };
    if (e.code in map) { e.preventDefault(); laneAction(map[e.code]); }
  }
});

// ─── Main Loop ─────────────────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastT) / 1000, 0.05);
  lastT = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { lastT = ts; requestAnimationFrame(loop); });

})();
</script>
</body>
</html>
